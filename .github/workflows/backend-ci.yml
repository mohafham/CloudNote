name: Backend Migrations and Integration Tests

on:
  push:
  workflow_dispatch:

jobs:
  backend-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_ADMIN_URL: postgres://postgres:postgres@localhost:5432/postgres
      CREATE_DATABASE_NAME: cloud_notes
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/cloud_notes
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create application database
        run: pnpm db:create

      - name: Run SQL migrations
        run: pnpm db:migrate

      - name: Run backend integration tests
        run: pnpm --filter @cloud-notes/backend test:integration
