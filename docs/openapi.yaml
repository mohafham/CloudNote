openapi: 3.1.0
info:
  title: Cloud Notes API
  version: 0.1.0
  summary: API contract for the cloud-based notes platform.
servers:
  - url: http://localhost:4000
    description: Local development API

tags:
  - name: Health
  - name: Auth
  - name: Folders
  - name: Notes
  - name: Sharing
  - name: Attachments
  - name: Search

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                required: [status, service]

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Sign in with credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh and access tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token rotation successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/guest:
    post:
      tags: [Auth]
      summary: Enter guest mode (no cloud benefits)
      responses:
        "200":
          description: Guest mode session established
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    enum: [guest]
                  guestId:
                    type: string
                    format: uuid
                  warning:
                    type: string
                required: [mode, guestId, warning]

  /folders:
    get:
      tags: [Folders]
      summary: List folders owned by authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Folder list
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items:
                      $ref: "#/components/schemas/Folder"
                required: [folders]
    post:
      tags: [Folders]
      summary: Create folder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
      responses:
        "201":
          description: Folder created
          content:
            application/json:
              schema:
                type: object
                properties:
                  folder:
                    $ref: "#/components/schemas/Folder"
                required: [folder]

  /folders/{folderId}:
    patch:
      tags: [Folders]
      summary: Update folder
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FolderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderRequest"
      responses:
        "200":
          description: Folder updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  folder:
                    $ref: "#/components/schemas/Folder"
                required: [folder]
    delete:
      tags: [Folders]
      summary: Delete folder
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FolderId"
      responses:
        "204":
          description: Folder deleted

  /notes:
    get:
      tags: [Notes]
      summary: List notes visible to user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: folderId
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [note, checklist]
        - in: query
          name: includeArchived
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                type: object
                properties:
                  notes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Note"
                required: [notes]
    post:
      tags: [Notes]
      summary: Create note or checklist note
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                type: object
                properties:
                  note:
                    $ref: "#/components/schemas/Note"
                required: [note]

  /notes/{noteId}:
    get:
      tags: [Notes]
      summary: Get note details
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Note details with related entities
          content:
            application/json:
              schema:
                type: object
                properties:
                  note:
                    $ref: "#/components/schemas/Note"
                  access:
                    type: string
                    enum: [view, edit, owner]
                  attachments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Attachment"
                  checklists:
                    type: array
                    items:
                      $ref: "#/components/schemas/Checklist"
                  blocks:
                    type: array
                    items:
                      $ref: "#/components/schemas/NoteBlock"
                required: [note, access, attachments, checklists, blocks]
    patch:
      tags: [Notes]
      summary: Update note
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: Note updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  note:
                    $ref: "#/components/schemas/Note"
                required: [note]
    delete:
      tags: [Notes]
      summary: Delete note (owner only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "204":
          description: Note deleted

  /notes/{noteId}/share:
    get:
      tags: [Sharing]
      summary: List share links for a note
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Share links
          content:
            application/json:
              schema:
                type: object
                properties:
                  shareLinks:
                    type: array
                    items:
                      $ref: "#/components/schemas/ShareLink"
                required: [shareLinks]
    post:
      tags: [Sharing]
      summary: Create share link for a note
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareLinkRequest"
      responses:
        "201":
          description: Share link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  shareLink:
                    $ref: "#/components/schemas/ShareLink"
                required: [shareLink]

  /notes/{noteId}/share/{shareId}:
    patch:
      tags: [Sharing]
      summary: Update share link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
        - $ref: "#/components/parameters/ShareId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShareLinkRequest"
      responses:
        "200":
          description: Share link updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  shareLink:
                    $ref: "#/components/schemas/ShareLink"
                required: [shareLink]
    delete:
      tags: [Sharing]
      summary: Revoke share link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
        - $ref: "#/components/parameters/ShareId"
      responses:
        "204":
          description: Share link revoked

  /shared/{token}:
    get:
      tags: [Sharing]
      summary: Read shared note by public token
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared note content
          content:
            application/json:
              schema:
                type: object
                properties:
                  note:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      type:
                        type: string
                        enum: [note, checklist]
                      title:
                        type: string
                      content:
                        type: string
                      metadata:
                        type: object
                        additionalProperties: true
                      updatedAt:
                        type: string
                        format: date-time
                      accessLevel:
                        type: string
                        enum: [view, edit]
                    required: [id, type, title, content, metadata, updatedAt, accessLevel]
                  attachments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Attachment"
                required: [note, attachments]

  /notes/{noteId}/collaborators:
    post:
      tags: [Sharing]
      summary: Add or update collaborator by account email
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollaboratorRequest"
      responses:
        "200":
          description: Collaborator added or updated

  /notes/{noteId}/collaborators/{collaboratorUserId}:
    delete:
      tags: [Sharing]
      summary: Remove collaborator from note
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
        - in: path
          name: collaboratorUserId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Collaborator removed

  /notes/{noteId}/attachments:
    get:
      tags: [Attachments]
      summary: List note attachments
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Attachment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Attachment"
                required: [attachments]
    post:
      tags: [Attachments]
      summary: Create attachment metadata and upload URL
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttachmentRequest"
      responses:
        "201":
          description: Attachment prepared
          content:
            application/json:
              schema:
                type: object
                properties:
                  attachment:
                    $ref: "#/components/schemas/Attachment"
                  uploadUrl:
                    type: string
                    format: uri
                  uploadMethod:
                    type: string
                    enum: [PUT]
                required: [attachment, uploadUrl, uploadMethod]

  /notes/{noteId}/attachments/{attachmentId}:
    delete:
      tags: [Attachments]
      summary: Remove attachment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
        - in: path
          name: attachmentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Attachment removed

  /notes/{noteId}/checklists:
    get:
      tags: [Notes]
      summary: List checklists hosted by note
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Checklist list
          content:
            application/json:
              schema:
                type: object
                properties:
                  checklists:
                    type: array
                    items:
                      $ref: "#/components/schemas/Checklist"
                required: [checklists]
    post:
      tags: [Notes]
      summary: Create checklist for a note
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChecklistRequest"
      responses:
        "201":
          description: Checklist created

  /notes/checklists/{checklistId}/items:
    post:
      tags: [Notes]
      summary: Add checklist item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: checklistId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChecklistItemRequest"
      responses:
        "201":
          description: Checklist item added

  /notes/checklists/{checklistId}/items/{itemId}:
    patch:
      tags: [Notes]
      summary: Update checklist item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: checklistId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChecklistItemRequest"
      responses:
        "200":
          description: Checklist item updated
    delete:
      tags: [Notes]
      summary: Delete checklist item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: checklistId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: itemId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Checklist item deleted

  /notes/{noteId}/blocks:
    post:
      tags: [Notes]
      summary: Add note block (voice transcript, diagram, checklist block)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBlockRequest"
      responses:
        "201":
          description: Note block created

  /notes/{noteId}/blocks/{blockId}:
    patch:
      tags: [Notes]
      summary: Update note block
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
        - in: path
          name: blockId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteBlockRequest"
      responses:
        "200":
          description: Block updated
    delete:
      tags: [Notes]
      summary: Delete note block
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
        - in: path
          name: blockId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Block deleted

  /notes/{noteId}/links:
    get:
      tags: [Notes]
      summary: List note links
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Linked notes
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items:
                      $ref: "#/components/schemas/NoteLink"
                required: [links]
    post:
      tags: [Notes]
      summary: Create note link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteLinkRequest"
      responses:
        "201":
          description: Link created

  /notes/{noteId}/realtime-token:
    post:
      tags: [Notes]
      summary: Mint realtime collaboration token
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NoteId"
      responses:
        "200":
          description: Realtime token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  noteId:
                    type: string
                    format: uuid
                  accessLevel:
                    type: string
                    enum: [view, edit, owner]
                  realtimeToken:
                    type: string
                required: [noteId, accessLevel, realtimeToken]

  /search:
    get:
      tags: [Search]
      summary: Search notes by keyword (title-first)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  keyword:
                    type: string
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        type:
                          type: string
                          enum: [note, checklist]
                        title:
                          type: string
                        folderId:
                          type: string
                          format: uuid
                          nullable: true
                        excerpt:
                          type: string
                        updatedAt:
                          type: string
                          format: date-time
                      required: [id, type, title, folderId, excerpt, updatedAt]
                required: [keyword, count, results]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    NoteId:
      in: path
      name: noteId
      required: true
      schema:
        type: string
        format: uuid
    FolderId:
      in: path
      name: folderId
      required: true
      schema:
        type: string
        format: uuid
    ShareId:
      in: path
      name: shareId
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
      required: [id, email, displayName]

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [accessToken, refreshToken]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/TokenPair"
      required: [user, tokens]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
      required: [email, password, displayName]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [email, password]

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    Folder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, ownerId, name, icon, color, createdAt, updatedAt]

    CreateFolderRequest:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
      required: [name]

    UpdateFolderRequest:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"

    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        folderId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [note, checklist]
        title:
          type: string
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        isArchived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, ownerId, folderId, type, title, content, metadata, isArchived, createdAt, updatedAt]

    CreateNoteRequest:
      type: object
      properties:
        type:
          type: string
          enum: [note, checklist]
          default: note
        title:
          type: string
        content:
          type: string
        folderId:
          type: string
          format: uuid
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    UpdateNoteRequest:
      type: object
      properties:
        type:
          type: string
          enum: [note, checklist]
        title:
          type: string
        content:
          type: string
        folderId:
          type: string
          format: uuid
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        isArchived:
          type: boolean

    ShareLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        noteId:
          type: string
          format: uuid
        token:
          type: string
        accessLevel:
          type: string
          enum: [view, edit]
        isActive:
          type: boolean
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, noteId, token, accessLevel, isActive, expiresAt, createdAt]

    CreateShareLinkRequest:
      type: object
      properties:
        accessLevel:
          type: string
          enum: [view, edit]
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required: [accessLevel]

    UpdateShareLinkRequest:
      type: object
      properties:
        accessLevel:
          type: string
          enum: [view, edit]
        isActive:
          type: boolean
        expiresAt:
          type: string
          format: date-time
          nullable: true

    CreateCollaboratorRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        accessLevel:
          type: string
          enum: [view, edit]
      required: [email, accessLevel]

    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        mimeType:
          type: string
          enum: [image/png, image/jpeg, image/webp, application/pdf]
        sizeBytes:
          type: integer
          minimum: 1
        publicUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, fileName, mimeType, sizeBytes, publicUrl, createdAt]

    CreateAttachmentRequest:
      type: object
      properties:
        fileName:
          type: string
        mimeType:
          type: string
          enum: [image/png, image/jpeg, image/webp, application/pdf]
        sizeBytes:
