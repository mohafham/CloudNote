version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: cloud-notes-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud_notes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cloud-notes-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: cloud-notes-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: cloud-notes-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/note-attachments || true &&
      mc anonymous set none local/note-attachments || true
      "

volumes:
  postgres_data:
  minio_data:
